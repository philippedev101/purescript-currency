name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: purescript-contrib/setup-purescript@main
        with:
          purescript: "latest"
          spago: "unstable"

      - name: Install dependencies
        run: spago install

      - name: Build
        run: spago build

      - name: Test
        run: spago test
